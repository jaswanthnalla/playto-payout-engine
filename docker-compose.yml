version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: playto
      POSTGRES_USER: playto
      POSTGRES_PASSWORD: playto
    ports: ['5432:5432']
    volumes: [pgdata:/var/lib/postgresql/data]

  redis:
    image: redis:7-alpine
    ports: ['6379:6379']

  backend:
    build: ./backend
    command: sh -c "python manage.py migrate && python manage.py seed_merchants && python manage.py runserver 0.0.0.0:8000"
    volumes: ['./backend:/app']
    ports: ['8000:8000']
    environment:
      SECRET_KEY: dev-secret
      DEBUG: 'True'
      ALLOWED_HOSTS: '*'
      DATABASE_URL: postgresql://playto:playto@db:5432/playto
      REDIS_URL: redis://redis:6379/0
    depends_on: [db, redis]

  celery:
    build: ./backend
    command: celery -A config worker -l info
    volumes: ['./backend:/app']
    environment:
      SECRET_KEY: dev-secret
      DATABASE_URL: postgresql://playto:playto@db:5432/playto
      REDIS_URL: redis://redis:6379/0
    depends_on: [db, redis, backend]

  beat:
    build: ./backend
    command: celery -A config beat -l info
    volumes: ['./backend:/app']
    environment:
      SECRET_KEY: dev-secret
      DATABASE_URL: postgresql://playto:playto@db:5432/playto
      REDIS_URL: redis://redis:6379/0
    depends_on: [db, redis, backend]

  frontend:
    build: ./frontend
    ports: ['3000:5173']
    volumes: ['./frontend:/app', '/app/node_modules']
    environment:
      VITE_API_URL: http://backend:8000
    depends_on: [backend]

volumes:
  pgdata:
